<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | VECTA University</title>
    <meta name="description" content="Register for admission at Innovation University. Fill out the form below.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><div class="logo-icon">VU</div> VECTA Univ.</a>
            <button class="mobile-toggle">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="registration.html" class="active">Register</a></li>
                <li><a href="contact.html" class="btn-apply">Contact</a></li>
                <li><a href="faculty.html">Faculty</a></li>
            </ul>
        </div>
    </nav>

    <section>
        <div class="container">
            <div class="section-header">
                <span class="tag">Admissions</span>
                <h2>Student Registration</h2>
            </div>
            <div style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <form id="contactForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Interested Course</label>
                        <select>
                            <option>Computer Science</option>
                            <option>Business</option>
                            <option>Design</option>
                        </select>
                    </div>
                    <button type="submit" class="form-submit">Submit Registration</button>
                    <p id="statusMsg" class="status-msg"></p>
                </form>
            </div>
        </div>
    </section>

    <div class="view-switcher">
        <button class="view-btn active" data-mode="desktop">💻 Desktop</button>
        <button class="view-btn" data-mode="tablet">📟 Tablet</button>
        <button class="view-btn" data-mode="mobile">📱 Mobile</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
